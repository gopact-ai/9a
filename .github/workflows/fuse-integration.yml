name: fuse integration

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: fuse / linux
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.25.12
          cache: true
      - name: Install FUSE runtime
        run: |
          sudo apt-get update
          sudo apt-get install --yes fuse3
          test -c /dev/fuse
          sudo chmod 666 /dev/fuse
      - name: Run required FUSE integration
        env:
          NINEA_REQUIRE_FUSE: "1"
        run: go test -count=1 -v ./internal/mount/fuse

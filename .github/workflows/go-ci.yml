name: go

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: go-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  required:
    name: go / required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    container:
      image: golang:1.25.12-bookworm@sha256:a9c020ee3d1508c7be5435c262434e3d3fc1d0e76a11afeb9ddae7d60bc86aa4
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Trust checked-out workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Verify Go toolchain
        run: go version | grep -F 'go1.25.12'
      - name: Check formatting and vet
        run: make check
      - name: Run linters
        run: make lint
      - name: Run unit tests
        run: make test
      - name: Run race detector
        run: GOFLAGS=-race make test
      - name: Build commands
        run: make build
      - name: Check release contract
        run: make test-release-check
      - name: Run end-to-end tests
        run: make test-e2e
      - name: Check known vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  docs:
    name: docs / required
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Check documentation, workflows, links, and secrets
        run: make docs-check

apiVersion: 9a.dev/v1alpha1
kind: Skill
metadata:
  name: signed-orders
  description: Demonstrate an explicitly enabled executable request hook.
variables:
  signing-secret:
    fromEnv: ORDER_SIGNING_SECRET
    sensitive: true
    required: true
services:
  orders:
    baseURL: https://orders.example.com
operations:
  get-order:
    service: orders
    method: GET
    path: /v1/orders
    request:
      query:
        id: "{{ input.id }}"
    hooks:
      beforeRequest:
        - exec:
            command: [/absolute/path/to/examples/declarative/hooks/sign-request.py]
            env: [ORDER_SIGNING_SECRET]
            timeout: 2s
            maxOutputBytes: 1048576
      afterResponse:
        - transform:
            language: jq
            expression: .body
security:
  allowExecutableHooks: true
